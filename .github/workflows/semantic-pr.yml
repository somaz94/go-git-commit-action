name: Semantic PR

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  semantic-pr:
    uses: somaz94/.github/.github/workflows/semantic-pr-reusable.yml@main
    # Skip this repo's own E2E self-test PRs — the `test` fixture branch and the
    # auto-generated `update-files-*` branches opened by use-action.yml — whose
    # titles are intentionally non-conventional. The prefix matching lives in the
    # reusable; real contributor PRs (any other head branch) still get validated.
    with:
      skip-head-ref-prefixes: |
        test
        update-files-
